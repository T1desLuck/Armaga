<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Terms of Service</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background: #2c3e50;
            color: #fff;
            text-align: center;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2em;
        }

        main {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .text-block {
            background: #fff;
            border-radius: 12px;
            padding: 25px 30px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 600px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .nav-link {
            display: inline-block;
            margin-top: 25px;
            text-decoration: none;
            background: #3498db;
            color: #fff;
            padding: 10px 25px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-link:hover {
            background: #2980b9;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 0.9rem;
        }

        @media(max-width: 600px){
            .text-block {
                padding: 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Terms of Service</h1>
    </header>

    <main>
        <div class="text-block" id="content">Загрузка...</div>
    </main>

    <div style="text-align:center;">
        <a class="nav-link" href="index.html">Read Privacy Policy</a>
    </div>

    <footer>
        &copy; 2026 Armaga Signatures
    </footer>

    <script>
        fetch('Terms_of_Service.txt')
            .then(response => response.text())
            .then(text => document.getElementById('content').textContent = text)
            .catch(err => document.getElementById('content').textContent = 'Ошибка загрузки файла.');
    </script>
</body>
</html>
