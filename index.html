<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Privacy Policy</title>
</head>
<body>
    <h1>Информация из Privacy_Policy.txt</h1>
    <pre id="content">Загрузка...</pre>
    <p><a href="about.html">Прочесть Terms of Service</a></p>

    <script>
        fetch('Privacy_Policy.txt')
            .then(response => response.text())
            .then(text => document.getElementById('content').textContent = text)
            .catch(err => document.getElementById('content').textContent = 'Ошибка загрузки файла.');
    </script>
</body>
</html>
